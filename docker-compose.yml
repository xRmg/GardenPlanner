services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: garden-planner-backend
    restart: unless-stopped

    networks:
      - pangolin

    environment:
      - NODE_ENV=production
      - GARDEN_PROXY_AUTH_FILE=/auth/proxy-auth-token

    volumes:
      - garden-data:/app/data
      - auth-data:/auth

    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  garden-planner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: garden-planner
    restart: unless-stopped

    networks:
      - pangolin

    environment:
      - NODE_ENV=production
      - GARDEN_PROXY_AUTH_FILE=/auth/proxy-auth-token

    depends_on:
      backend:
        condition: service_healthy

    volumes:
      - auth-data:/auth:ro

    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://127.0.0.1/index.html"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

volumes:
  garden-data:
  auth-data:

networks:
  pangolin:
    external: true
